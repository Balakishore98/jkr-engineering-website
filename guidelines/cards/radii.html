<!-- @dsCard group="Spacing" viewport="700x160" name="Corner Radii" subtitle="Small & machined — nothing pill-soft on surfaces" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 22px 24px; font-family: var(--font-mono); }
  .row { display: flex; gap: 18px; }
  .cell { text-align: center; }
  .box { width: 80px; height: 56px; background: var(--steel-100); border: 1px solid var(--border-strong); }
  .lab { font-size: 11px; color: var(--text-faint); margin-top: 8px; }
</style></head><body>
  <div class="row" id="s"></div>
  <script>
    const t = [['xs','2px'],['sm','4px'],['md','6px'],['lg','10px'],['xl','16px']];
    document.getElementById('s').innerHTML = t.map(([k,v]) =>
      `<div class="cell"><div class="box" style="border-radius:var(--radius-${k})"></div><div class="lab">--radius-${k}<br>${v}</div></div>`).join('');
  </script>
</body></html>
