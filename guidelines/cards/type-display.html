<!-- @dsCard group="Type" viewport="700x230" name="Display & Headings" subtitle="IBM Plex Sans Condensed, tight tracking" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-strong); padding: 22px 26px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border); padding: 10px 0; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--text-faint); white-space: nowrap; }
  .d { font-family: var(--font-display); font-weight: 700; letter-spacing: var(--ls-tight); line-height: 1.05; }
</style></head><body>
  <div class="row"><span class="d" style="font-size:52px">Precision CNC</span><span class="meta">Display · Condensed 700</span></div>
  <div class="row"><span class="d" style="font-size:36px">Machined to spec</span><span class="meta">H2 · 36 / 700</span></div>
  <div class="row"><span class="d" style="font-size:26px">Capabilities &amp; tooling</span><span class="meta">H3 · 26 / 700</span></div>
</body></html>
