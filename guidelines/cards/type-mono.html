<!-- @dsCard group="Type" viewport="700x180" name="Mono — Labels & Specs" subtitle="IBM Plex Mono, uppercase, wide tracking" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 26px; font-family: var(--font-mono); }
  .label { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .tick { width: 24px; height: 2px; background: var(--accent); }
  .spec { display: flex; gap: 28px; font-size: 14px; color: var(--text-strong); }
  .spec b { color: var(--text-faint); font-weight: 500; display: block; font-size: 11px; letter-spacing: 0.12em; margin-bottom: 4px; }
</style></head><body>
  <div class="label"><span class="tick"></span>What we do</div>
  <div class="spec">
    <div><b>MATERIAL</b>EN8 / SS304</div>
    <div><b>TOLERANCE</b>±0.01 mm</div>
    <div><b>PART NO.</b>JKR-2005-A</div>
    <div><b>QTY</b>250</div>
  </div>
</body></html>
